<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BMS Smart Panel">
  <!-- Знак BMS Smart Panel: дом-в-круге (адаптация основного лого под Smart Panel).
       Все элементы currentColor → наследуют цвет текста (тема HA). -->
  <!-- Внешнее кольцо -->
  <circle cx="24" cy="24" r="20.3" stroke="currentColor" stroke-width="2.8"/>
  <!-- Крыша (chevron) -->
  <path d="M11.5 26.2 L24 14 L36.5 26.2" stroke="currentColor" stroke-width="2.9"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Up-arrow на левом скате — «smart / рост» -->
  <path d="M17.6 21.4 V13.6 M14.3 16.9 L17.6 13.6 L20.9 16.9" stroke="currentColor"
        stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Корпус дома -->
  <path d="M15 26 V36.4 H33 V26" stroke="currentColor" stroke-width="2.9"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 4 окна 2×2 (панель управления) -->
  <rect x="19.1" y="28.6" width="3.4" height="3.4" rx="0.9" fill="currentColor"/>
  <rect x="25.5" y="28.6" width="3.4" height="3.4" rx="0.9" fill="currentColor"/>
  <rect x="19.1" y="32.9" width="3.4" height="2.6" rx="0.8" fill="currentColor"/>
  <rect x="25.5" y="32.9" width="3.4" height="2.6" rx="0.8" fill="currentColor"/>
</svg>
